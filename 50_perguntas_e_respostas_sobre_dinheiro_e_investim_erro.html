<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Perguntas e Respostas Sobre Dinheiro e Investimentos - Darwin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>

        /* Barra de Progresso */
        #sp {

        }

        nav a.cta-btn {

        }

        nav a.cta-btn:hover {

            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero .subheadline {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.95;
            font-weight: 400;
        }

        .hero-buttons {

            gap: 16px;
            justify-content: center;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 16px 40px;

            font-weight: 600;

            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .cta-btn.primary {
            background: #fff;
            color: #2d7a3e;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .cta-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);

        .social-proof {

            font-size: 14px;

        .proof-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .proof-item strong {
            font-size: 20px;
        }

        .pains {

            text-align: center;
            color: #1a1a1a;

        .pains-grid {

            gap: 30px;
        }

        .pain-card {
            background: #f5f5f3;
            padding: 40px;
            border-radius: 12px;
            border-left: 5px solid #d4544a;

            transition: all 0.3s ease;

        .pain-card.rv.in {

        }

        .pain-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #1a1a1a;

        }

            transform: scale(1);

        }

        .final-cta .cta-btn.primary:hover {

        }
