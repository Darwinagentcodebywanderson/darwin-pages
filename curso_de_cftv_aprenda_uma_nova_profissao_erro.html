<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprenda CFTV e Transforme Sua Carreira | Darwin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
            line-height: 1.6;
        }

        /* Barra de progresso */
        #sp {
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        /* Navegação */
        #mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        #mainnav.scrolled {
            border-bottom-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-family: 'Sora', sans-serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .nav-cta {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 153, 255, 0.3);
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 153, 255, 0.4);
        }

        /* Hero */
        .hero {
            padding: 120px 32px 80px;
            text-align: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4ff 100%);
            margin-top: 64px;
        }

        .hero-content {
            max-width: 700px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Sora', sans-serif;
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #1a202c;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: #555;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 16px 32px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-family: 'Inter', sans-serif;
        }

        .cta-btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #fff;
            box-shadow: 0 8px 25px rgba(0, 153, 255, 0.35);
        }

        .cta-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 153, 255, 0.45);
        }

        .cta-btn-secondary {
            background: transparent;
            color: #0099ff;
            border: 2px solid #0099ff;
        }

        .cta-btn-secondary:hover {
            background: #0099ff;
            color: #fff;
        }

        .social-proof {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 24px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            margin: 0 auto;
            max-width: 600px;
        }

        .proof-item {
            text-align: center;
        }

        .proof-number {
            font-size: 28px;
            font-weight: 800;
            color: #0099ff;
            display: block;
        }

        .proof-text {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        /* Seção Dores */
        .dores {
            padding: 80px 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Sora', sans-serif;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            color: #1a202c;
        }

        .section-title span {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .dor-card {
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            border-left: 4px solid #ff6b6b;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            opacity: 0;
            transition: all 0.5s ease;
        }

        .dor-card.rv.in {
            opacity: 1;
        }

        .dor-card h3 {
            font-size: 20px;
            color: #1a202c;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .dor-card p {
            color: #666;
            font-size: 15px;
        }

        /* Benefícios */
        .beneficios {
            padding: 80px 32px;
            background: linear-gradient(135deg, #f0f4ff 0%, #f8f9fa 100%);
        }

        .beneficios-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .beneficios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin-top: 48px;
        }

        .beneficio-card {
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-top: 4px solid #00d4ff;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .beneficio-card.rv.in {
            opacity: 1;
        }

        .beneficio-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }

        .beneficio-card h3 {
            font-size: 18px;
            color: #1a202c;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .beneficio-card p {
            color: #666;
            font-size: 14px;
        }

        /* Números */
        .numeros {
            padding: 80px 32px;
            background: linear-gradient(135deg, #1a202c, #2c3e50);
            color: #fff;
        }

        .numeros-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .numeros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-top: 48px;
        }

        .numero-card {
            text-align: center;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .numero-card.rv.in {
            opacity: 1;
        }

        .numero-card .numero {
            font-family: 'Sora', sans-serif;
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
        }

        .numero-card .label {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Depoimentos */
        .depoimentos {
            padding: 80px 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .depoimentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
            margin-top: 48px;
        }

        .depoimento-card {
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8eef5;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .depoimento-card.rv.in {
            opacity: 1;
        }

        .stars {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .depoimento-texto {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
            font-style: italic;
            line-height: 1.8;
        }

        .depoimento-autor {
            font-weight: 700;
            color: #1a202c;
            font-size: 14px;
        }

        .depoimento-cargo {
            font-size: 12px;
            color: #0099ff;
            margin-top: 4px;
        }

        /* Garantia */
        .garantia {
            padding: 80px 32px;
            background: linear-gradient(135deg, #f0f4ff 0%, #f8f9fa 100%);
        }

        .garantia-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            background: #fff;
            padding: 48px 32px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            border: 2px solid #00d4ff;
        }

        .garantia-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
        }

        .garantia-container h2 {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 16px;
        }

        .garantia-container p {
            color: #666;
            font-size: 15px;
            line-height: 1.8;
        }

        /* CTA Final */
        .cta-final {
            padding: 80px 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cta-final-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
        }

        .cta-final-text h2 {
            font-family: 'Sora', sans-serif;
            font-size: 42px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 24px;
            color: #1a202c;
        }

        .cta-final-text h2 span {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .checklist {
            margin: 32px 0;
        }

        .checklist-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 15px;
            color: #555;
        }

        .checklist-item
