<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Perguntas e Respostas Sobre Dinheiro e Investimentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            background: #fafafa;
        }

        html, body {
            scroll-behavior: smooth;
        }

        /* PROGRESSO */
        #sp {
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        /* NAV */
        #mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        #mainnav.scrolled {
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            color: #2ecc71;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-cta {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        /* HERO */
        .hero {
            padding-top: 140px;
            padding-bottom: 80px;
            background: linear-gradient(135deg, #f8fffe 0%, #f0fdf9 100%);
            overflow: hidden;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 20px;
            color: #0a0a0a;
        }

        .hero h1 .highlight {
            color: #2ecc71;
            background: linear-gradient(120deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #555;
            margin-bottom: 32px;
            line-height: 1.7;
            max-width: 700px;
        }

        .hero-cta-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 48px;
            align-items: center;
        }

        .cta-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 16px 40px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 16px rgba(46, 204, 113, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(46, 204, 113, 0.4);
        }

        .cta-btn:active {
            transform: translateY(-1px);
        }

        .trust-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .trust-icon {
            width: 24px;
            height: 24px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* DORES */
        .pains {
            padding: 80px 24px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #2ecc71;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 6vw, 44px);
            font-weight: 800;
            margin-bottom: 48px;
            color: #0a0a0a;
        }

        .pain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .pain-card {
            background: white;
            padding: 32px;
            border-radius: 12px;
            border-left: 4px solid #e74c3c;
            opacity: 0;
            transition: all 0.6s ease;
        }

        .pain-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .pain-card.rv {
            transform: translateY(20px);
        }

        .pain-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .pain-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #0a0a0a;
        }

        .pain-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* BENEFÍCIOS */
        .benefits {
            padding: 80px 24px;
            background: white;
        }

        .benefits-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 28px;
            margin-top: 48px;
        }

        .benefit-item {
            display: flex;
            gap: 16px;
            padding: 24px;
            background: #f9fffe;
            border-radius: 10px;
            border: 1px solid #e8f5f0;
            opacity: 0;
            transition: all 0.6s ease;
        }

        .benefit-item.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .benefit-item.rv {
            transform: translateY(20px);
        }

        .benefit-check {
            width: 24px;
            height: 24px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 14px;
        }

        .benefit-text h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #0a0a0a;
        }

        .benefit-text p {
            font-size: 14px;
            color: #666;
        }

        /* NÚMEROS */
        .stats {
            padding: 80px 24px;
            background: linear-gradient(135deg, #f0fdf9 0%, #e0fef4 100%);
        }

        .stats-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 32px;
            margin-top: 48px;
        }

        .stat-box {
            text-align: center;
            padding: 32px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(46, 204, 113, 0.08);
            opacity: 0;
            transition: all 0.6s ease;
        }

        .stat-box.rv.in {
            opacity: 1;
            transform: scale(1);
        }

        .stat-box.rv {
            transform: scale(0.9);
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 800;
            color: #2ecc71;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        /* DEPOIMENTOS */
        .testimonials {
            padding: 80px 24px;
            background: white;
        }

        .testimonials-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
            margin-top: 48px;
        }

        .testimonial {
            background: #fafafa;
            padding: 28px;
            border-radius: 12px;
            border: 1px solid #e8e8e8;
            opacity: 0;
            transition: all 0.6s ease;
        }

        .testimonial.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial.rv {
            transform: translateY(20px);
        }

        .stars {
            color: #f39c12;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .testimonial-text {
            font-size: 15px;
            color: #333;
            margin-bottom: 16px;
            font-style: italic;
            line-height: 1.7;
        }

        .testimonial-author {
            font-weight: 700;
            font-size: 14px;
            color: #0a0a0a;
        }

        .testimonial-role {
            font-size: 13px;
            color: #999;
        }

        /* GARANTIA */
        .guarantee {
            padding: 80px 24px;
            background: linear-gradient(135deg, #f0fdf9 0%, #e0fef4 100%);
        }

        .guarantee-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .guarantee-box {
            background: white;
            padding: 48px;
            border-radius: 16px;
            border: 2px solid #2ecc71;
            text-align: center;
            box-shadow: 0 8px 32px rgba(46, 204, 113, 0.15);
            opacity: 0;
            transition: all 0.6s ease;
        }

        .guarantee-box.rv.in {
            opacity: 1;
            transform: scale(1);
        }

        .guarantee-box.rv {
            transform: scale(0.95);
        }

        .guarantee-icon {
            font-size: 56px;
            margin-bottom: 24px;
        }

        .guarantee-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #0a0a0a;
        }

        .guarantee-box p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
        }

        /* CTA FINAL */
        .final-cta {
            padding: 80px 24px;
            background: white;
        }

        .final-cta-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .final-cta-content {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 60px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 12px 48px rgba(46, 204, 113, 0.3);
        }

        .final-cta-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 6vw, 40px);
            font-weight: 800;
            margin-bottom: 24px;
        }

        .final-cta-content p {
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.7;
            opacity: 0.95;
        }
