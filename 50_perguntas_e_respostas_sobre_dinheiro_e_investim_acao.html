<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <style>

        /* BARRA DE PROGRESSO */

            background: transparent;
            transition: all 0.3s ease;

        nav#mainnav.scrolled {

            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        nav .cta-btn {
            padding: 0.6rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* STICKY CTA MOBILE */
        #stickycta {

            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        #stickycta button {
            width: 100%;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #stickycta button:active {
            transform: scale(0.98);
        }

        /* BOTÕES CTA */
        .cta-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            text-align: center;
        }

        .cta-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5);
        }

        .cta-btn:active {
            transform: translateY(-2px);
        }

        /* HERO */
        .hero {
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.8rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: #f1f5f9;
        }

        .hero h1 strong {
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            line-height: 1.7;

        .hero-cta-container {
            margin-bottom: 3rem;
        }

        .hero-cta-container .cta-btn {
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        }

        .proof-number {

            font-weight: 800;

            -webkit-text-fill-color: transparent;

        .proof-text {

        }

        .dor-card p {
            color: #cbd5e1;
            line-height: 1.7;

        .beneficio-item h3 {

        .beneficio-item p {

        .numero-card:hover {

            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .numero-label {
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* DEPOIMENTOS */

        .depoimento-cargo {

        .depoimento-resultado {

        .garantia-section {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%);

        }

        .garantia-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
