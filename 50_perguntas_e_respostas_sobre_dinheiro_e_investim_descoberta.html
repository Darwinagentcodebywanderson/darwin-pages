<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Perguntas e Respostas Sobre Dinheiro e Investimentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            background: #fafafa;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Barra de progresso */
        #sp {
            background: linear-gradient(90deg, #2d5a3d 0%, #4a8f5e 100%);
            box-shadow: 0 0 10px rgba(45, 90, 61, 0.4);
        }

        /* Navegação */
        nav#mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        nav#mainnav.scrolled {
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.98);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #2d5a3d 0%, #4a8f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-cta {
            background: linear-gradient(135deg, #2d5a3d 0%, #4a8f5e 100%);
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 90, 61, 0.3);
        }

        /* Hero */
        .hero {
            padding: 120px 24px 80px 24px;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #f5fdf8 0%, #f0f5f2 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(74, 143, 94, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45, 90, 61, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .hero-accent {
            background: linear-gradient(135deg, #2d5a3d 0%, #4a8f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: #555;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 16px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .cta-btn.primary {
            background: linear-gradient(135deg, #2d5a3d 0%, #4a8f5e 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(45, 90, 61, 0.25);
        }

        .cta-btn.primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(45, 90, 61, 0.35);
        }

        .cta-btn.secondary {
            background: white;
            color: #2d5a3d;
            border: 2px solid #2d5a3d;
        }

        .cta-btn.secondary:hover {
            background: #f0f5f2;
        }

        .hero-social {
            font-size: 14px;
            color: #666;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .hero-social strong {
            color: #2d5a3d;
            font-weight: 700;
        }

        /* Seção de dores */
        .pains {
            padding: 80px 24px;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            color: #1a1a1a;
        }

        .pains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .pain-card {
            padding: 40px;
            background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
            border-radius: 12px;
            border-left: 4px solid #e74c3c;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .pain-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .pain-card.rv {
            transform: translateY(20px);
        }

        .pain-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #2d5a3d;
        }

        .pain-card p {
            font-size: 16px;
            color: #666;
            line-height: 1.7;
        }

        .pain-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        /* Seção de transformação */
        .transformation {
            padding: 80px 24px;
            background: linear-gradient(135deg, #f5fdf8 0%, #f0f5f2 100%);
            max-width: 1200px;
            margin: 0 auto;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 28px;
            margin-top: 50px;
        }

        .benefit-item {
            padding: 32px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transition: all 0.5s ease;
        }

        .benefit-item.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .benefit-item.rv {
            transform: translateY(20px);
        }

        .benefit-item:hover {
            box-shadow: 0 8px 25px rgba(45, 90, 61, 0.15);
            transform: translateY(-4px);
        }

        .benefit-number {
            background: linear-gradient(135deg, #2d5a3d 0%, #4a8f5e 100%);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .benefit-item h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .benefit-item p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* Stats */
        .stats {
            padding: 60px 24px;
            background: linear-gradient(135deg, #2d5a3d 0%, #4a8f5e 100%);
            color: white;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .stat-item h2 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-item p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* Testimonials */
        .testimonials {
            padding: 80px 24px;
            background: white;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-top: 50px;
        }

        .testimonial-card {
            padding: 36px;
            background: #f9f9f9;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .testimonial-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial-card.rv {
            transform: translateY(20px);
        }

        .testimonial-rating {
            color: #f39c12;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .testimonial-text {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
            font-style: italic;
            line-height: 1.8;
        }

        .testimonial-author {
            font-weight: 600;
            color: #2d5a3d;
            font-size: 15px;
        }

        .testimonial-meta {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* Garantia */
        .guarantee {
            padding: 60px 24px;
            text-align: center;
            background: linear-gradient(135deg, #f5fdf8 0%, #f0f5f2 100%);
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 16px;
        }

        .guarantee-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .guarantee h3 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #2d5a3d;
        }

        .guarantee p {
            font-size: 16px;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        /* CTA Final */
        .cta-final {
            padding: 80px 24px;
            background: white;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .cta-final h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .cta-final p {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }

        .checklist {
            max-width: 500px;
            margin: 0 auto 40px auto;
            text-align: left;
        }

        .checklist-item {
            padding: 12px 0;
            font-size: 16px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checklist-item::before {
            content: '✓';
            color: #4a8f5e;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .cta-final .cta-btn {
            padding: 18px 50px;
            font-size: 18px;
        }

        /* FAQ */
        .faq {
            padding: 80px 24px;
            background: linear-gradient(135deg, #f5fdf8 0%, #f0f5f2 100%);
            max-width: 800px;
            margin: 0 auto;
        }

        .faq h2
