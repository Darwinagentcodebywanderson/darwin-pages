<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de CFTV - Aprenda uma Nova Profissão | Darwin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        html {

        }

        body {

            color: #1a1a1a;

        }

        div#sp {

            left: 0;

        .nav-cta:hover {

        }

        section {
            padding: 80px 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

            text-align: center;
        }

        .hero-content {

            margin: 0 auto;
        }

            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;

        }

        .hero h1 {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subheading {
            font-size: 22px;
            color: #4a4a4a;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .cta-btn {
            display: inline-block;

            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
            margin-bottom: 20px;
        }

        .cta-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.4);
        }

        .social-proof {
            margin-top: 40px;
            color: #666;
            font-size: 15px;

            align-items: center;
            justify-content: center;

        .proof-stat {
            font-weight: 700;
            color: #ff6b35;
        }

        }

        .section-title {

            font-weight: 800;
            margin-bottom: 50px;
            text-align: center;
            color: #1a1a1a;
        }

        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .dor-item {
            padding: 40px;
            background: #f5f5f5;
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
            opacity: 0;
            animation: slideInUp 0.6s ease forwards;
        }

        .dor-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .dor-item:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dor-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff6b35;
        }

        .dor-text {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
        }

            gap: 30px;
        }

            border-radius: 12px;
            border: 1px solid #ffe0d1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);

            transition: all 0.3s ease;

        .beneficio-card.rv.in {
            opacity: 1;

            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(255, 107, 53, 0.15);
        }

        .beneficio-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);

        .beneficio-titulo {

            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .beneficio-desc {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        }

        .numero-box {

        }

        .numero-box.rv.in {
            opacity: 1;
            animation: countUp 1.5s ease;
        }

        @keyframes countUp {
            from {

                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .numero-valor {
            font-family: 'Syne', sans-serif;
            font-size: 52px;
            font-weight: 800;
            color: #ff6b35;
            margin-bottom: 10px;
        }

        .numero-label {
            font-size: 16px;
            color: #ccc;
            font-weight: 500;
        }

            font-style: italic;
        }

        .depo-autor {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 15px;
        }

        .depo-cargo {
            color: #ff6b35;
            font-size: 13px;
            font-weight: 600;

        .garantia-badge {

            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .garantia-titulo {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .garantia-texto {
            color: #666;
            font-size: 16px;
            line-height: 1.7;
        }

        .cta-final {
            background: #1a1a1a;
            color: #fff;
            text-align: center;

        .cta-final h2 {

            font-size: 42px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;

        .checklist {
            max-width: 500px;
            margin: 40px auto;
            text-align: left;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            font-size: 16px;
            line-height: 1.5;
        }

        .checklist-check {
            color: #ff6b35;
            font-weight: 800;
            font-size: 24px;
            flex-shrink: 0;
        }

        .cta-final .cta-btn {
            margin-top: 30px;
            padding: 20px 56px;
            font-size: 18px;
        }

        /* FAQ */
        .faq {
            background: #fff;
        }

        .faq-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .faq-item {
            border-bottom: 1px solid #e5e5e5;
            padding: 25px 0;
        }

        .faq-item.fi {
            cursor: pointer;
        }

        .faq-pergunta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            cursor: pointer;
            user-select: none;
        }

        .faq-icon {
            color: #ff6b35;
            font-size: 22px;
            transition: transform 0.3s ease;
            font-weight: 700;
        }

        .faq-item.open .faq-icon {
            transform: rotate(180deg);
        }
