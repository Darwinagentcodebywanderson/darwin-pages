<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de CFTV - Aprenda uma Nova Profissão Agora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            background: #ffffff;
            overflow-x: hidden;
        }

        /* NAV */
        nav#mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        nav#mainnav.scrolled {
            border-bottom: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav .cta-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        nav .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        /* PROGRESS BAR */
        #sp {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, #ff6b35 0%, #f7931e 100%);
            z-index: 999;
            transition: width .1s;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: white;
            padding: 120px 20px 80px;
            text-align: center;
            margin-top: 60px;
        }

        .hero h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 20px);
            color: #d0d0d0;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        .hero-cta {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        .hero .cta-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .hero .cta-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.4);
        }

        .social-proof {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px 30px;
            display: inline-block;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.6s forwards;
        }

        .social-proof p {
            font-size: 14px;
            margin: 0;
        }

        .social-proof strong {
            font-size: 18px;
            color: #ff6b35;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* DORES */
        .section {
            padding: 80px 20px;
        }

        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(28px, 6vw, 44px);
            font-weight: 700;
            text-align: center;
            margin-bottom: 60px;
            color: #0f0f1e;
        }

        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dor-card {
            background: linear-gradient(135deg, #fff5f1 0%, #fff9f7 100%);
            border: 2px solid #ffe0d5;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .dor-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .dor-card.rv {
            opacity: 0;
            transform: translateY(20px);
        }

        .dor-card:hover {
            border-color: #ff6b35;
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.15);
            transform: translateY(-8px);
        }

        .dor-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }

        .dor-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .dor-card p {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        /* BENEFÍCIOS */
        .benefits-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .benefit-card {
            background: white;
            border-radius: 12px;
            padding: 35px 30px;
            border: 1px solid #e8e8e8;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .benefit-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .benefit-card.rv {
            opacity: 0;
            transform: translateY(20px);
        }

        .benefit-card:hover {
            border-color: #ff6b35;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
            transform: translateY(-8px);
        }

        .benefit-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border-radius: 50%;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .benefit-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .benefit-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        /* NÚMEROS */
        .numbers-section {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: white;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .number-box {
            text-align: center;
            opacity: 0;
        }

        .number-box.rv.in {
            opacity: 1;
        }

        .number-box.rv {
            opacity: 0;
        }

        .number-box .big-number {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 800;
            color: #ff6b35;
            margin-bottom: 10px;
        }

        .number-box p {
            font-size: 16px;
            color: #d0d0d0;
            font-weight: 500;
        }

        /* DEPOIMENTOS */
        .testimonials-section {
            background: white;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial-card {
            background: white;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 35px 30px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .testimonial-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial-card.rv {
            opacity: 0;
            transform: translateY(20px);
        }

        .testimonial-card:hover {
            border-color: #ff6b35;
            box-shadow: 0 15px 45px rgba(255, 107, 53, 0.1);
        }

        .stars {
            color: #ffc107;
            font-size: 16px;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .testimonial-text {
            font-size: 15px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 20px;
            font-style: italic;
        }

        .testimonial-author {
            border-top: 2px solid #e8e8e8;
            padding-top: 15px;
        }

        .author-name {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .author-role {
            font-size: 13px;
            color: #888;
        }

        .result-highlight {
            background: #ffe8e0;
            color: #ff6b35;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
            margin-top: 10px;
        }

        /* GARANTIA */
        .warranty-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            text-align: center;
        }

        .warranty-box {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border: 3px solid #ff6b35;
            border-radius: 12px;
            padding: 50px 40px;
            opacity: 0;
        }

        .warranty-box.rv.in {
            opacity: 1;
        }

        .warranty-box.rv {
            opacity: 0;
            transform: translateY(20px);
        }

        .warranty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .warranty-box h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #0f0f1e;
            margin-bottom: 15px;
        }

        .warranty-box p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
        }

        /* CTA FINAL */
        .final-cta-section {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .final-cta-section h2 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(28px, 6vw, 44px);
            font-weight:
