<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Perguntas e Respostas Sobre Dinheiro e Investimentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .rv {
            opacity: 0;
            transition: opacity 0.6s ease-out;
        }
        .rv.in {
            opacity: 1;
        }
        nav#mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.98);
            transition: all 0.3s ease;
        }
        nav#mainnav.scrolled {
            background: rgba(255,255,255,1);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: -1px;
        }
        .nav-cta {
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        .nav-cta:hover {
            transform: translateY(-2px);
        }
        .hero {
            padding-top: 140px;
            padding-bottom: 80px;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f3f7 100%);
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 32px;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            line-height: 1.2;
            color: #1a1a1a;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .hero .subheadline {
            font-size: 20px;
            color: #555;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }
        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .cta-btn {
            padding: 16px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .cta-btn.primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(30, 60, 114, 0.3);
        }
        .cta-btn.primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(30, 60, 114, 0.4);
        }
        .social-proof {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
            flex-wrap: wrap;
        }
        .proof-item {
            text-align: center;
        }
        .proof-item .number {
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
        }
        .proof-item .label {
            font-size: 13px;
            color: #777;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section {
            padding: 80px 32px;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            margin-bottom: 50px;
            text-align: center;
            color: #1a1a1a;
        }
        .section-subtitle {
            font-size: 18px;
            color: #666;
            text-align: center;
            margin-bottom: 60px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin-top: 50px;
        }
        .dore-card {
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            border-left: 4px solid #e74c3c;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .dore-card .icon {
            font-size: 40px;
            margin-bottom: 16px;
        }
        .dore-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .dore-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
            margin-top: 50px;
        }
        .benefit-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f3f7 100%);
            padding: 28px;
            border-radius: 10px;
            border-top: 3px solid #d4af37;
        }
        .benefit-card h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .benefit-card .check {
            color: #27ae60;
            font-size: 24px;
        }
        .benefit-card p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }
        .stats-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 80px 32px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }
        .stat-item h3 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .stat-item p {
            font-size: 16px;
            opacity: 0.9;
        }
        .testimonials {
            padding: 80px 32px;
            background: #f8f9fa;
        }
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
            margin-top: 50px;
        }
        .testimonial-card {
            background: white;
            padding: 32px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .testimonial-card .rating {
            color: #f39c12;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .testimonial-card p {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.7;
            font-style: italic;
        }
        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .testimonial-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37 0%, #c49a27 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }
        .testimonial-info h4 {
            font-size: 15px;
            color: #1a1a1a;
        }
        .testimonial-info .role {
            font-size: 12px;
            color: #999;
        }
        .guarantee {
            padding: 80px 32px;
        }
        .guarantee-box {
            background: linear-gradient(135deg, #f0f3f7 0%, #e8ecf2 100%);
            padding: 50px;
            border-radius: 12px;
            border-left: 6px solid #27ae60;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }
        .guarantee-box .shield {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .guarantee-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        .guarantee-box p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .cta-final {
            padding: 80px 32px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
        }
        .cta-final h2 {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            margin-bottom: 30px;
        }
        .cta-final p {
            font-size: 18px;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .checklist {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 500px;
            margin: 40px auto;
            text-align: left;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
        }
        .checklist-item:before {
            content: "✓";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #d4af37;
            color: #1e3c72;
            border-radius: 50%;
            font-weight: 700;
            flex-shrink: 0;
        }
        .cta-final .cta-btn {
            background: #d4af37;
            color: #1e3c72;
            padding: 18px 50px;
            font-size: 18px;
            margin-top: 30px;
        }
        .cta-final .cta-btn:hover {
            background: #e8c547;
        }
        .faq {
            padding: 80px 32px;
            background: #f8f9fa;
        }
        .faq-items {
            max-width: 700px;
            margin: 50px auto 0;
        }
        .fi {
            background: white;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .fi-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            transition: background 0.2s;
        }
        .fi-header:hover {
            background: #f8f9fa;
        }
        .fi-header h4 {
            font-size: 16px;
            color: #1a1a1a;
            font-weight: 600;
        }
        .fi-toggle {
            font-size: 20px;
            color: #d4af37;
            transition: transform 0.3s;
        }
        .fi.open .fi-toggle {
            transform: rotate(180deg);
        }
        .fi-content {
            display: none;
            padding: 0 20px 20px;
            font-size: 15px;
            color: #555;
            line-height: 1.7;
        }
        .fi.open .fi-content {
            display: block;
        }
        footer {
            background: #1a1a1a;
            color: #999;
            padding: 40px 32px;
            text-align: center;
            font-size: 13px;
        }
        footer p {
            margin-bottom: 12px;
        }
        #stickycta {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
        }
        #stickycta p {
            font-size: 14px;
            margin-bottom: 12px;
        }
        #stickycta .cta-btn {
            padding: 12px 32px;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            nav#mainnav {
                padding: 12px 16px;
            }
