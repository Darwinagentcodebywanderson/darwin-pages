<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de CFTV - Aprenda uma Nova Profissão | Darwin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #0a0e27;
            background: #ffffff;
            line-height: 1.6;
        }

        /* Barra de progresso */
        #sp {
            background: linear-gradient(90deg, #00d4ff, #0099ff, #00d4ff);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
        }

        /* Animações */
        .rv {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        /* Navbar */
        #mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0);
            transition: all 0.3s ease;
        }

        #mainnav.scrolled {
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-family: 'Sora', sans-serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-cta {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 60px 24px;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Sora', sans-serif;
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.1;
            animation: fadeInUp 0.8s ease;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: fadeInUp 0.8s ease 0.1s both;
        }

        .hero-cta {
            display: inline-block;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .cta-btn {
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: white;
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .cta-btn:hover::before {
            left: 100%;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.4);
        }

        .cta-btn:active {
            transform: translateY(-1px);
        }

        .social-proof {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .proof-item {
            text-align: center;
        }

        .proof-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .proof-label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Seção de Dores */
        .pains {
            padding: 80px 24px;
            background: #f8f9fa;
        }

        .section-title {
            font-family: 'Sora', sans-serif;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            color: #0a0e27;
        }

        .pains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pain-card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            border-left: 5px solid #ff4757;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .pain-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        .pain-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .pain-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .pain-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* Seção de Transformação */
        .transform {
            padding: 80px 24px;
            background: white;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .benefit-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .benefit-check {
            min-width: 50px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            flex-shrink: 0;
        }

        .benefit-text h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0a0e27;
        }

        .benefit-text p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* Números */
        .stats {
            padding: 80px 24px;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
            color: white;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-box h2 {
            font-family: 'Sora', sans-serif;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-box p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* Depoimentos */
        .testimonials {
            padding: 80px 24px;
            background: #f8f9fa;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border-top: 4px solid #00d4ff;
        }

        .stars {
            font-size: 14px;
            color: #ffc107;
            margin-bottom: 15px;
        }

        .testimonial-text {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
            font-style: italic;
        }

        .testimonial-author {
            font-weight: 700;
            color: #0a0e27;
            font-size: 15px;
        }

        .testimonial-role {
            font-size: 13px;
            color: #00d4ff;
            margin-top: 4px;
        }

        .result-badge {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
        }

        /* Garantia */
        .guarantee {
            padding: 80px 24px;
            background: white;
            text-align: center;
        }

        .guarantee-box {
            max-width: 700px;
            margin: 0 auto;
            padding: 50px 40px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(0, 153, 255, 0.05));
            border: 2px solid #00d4ff;
            border-radius: 12px;
        }

        .guarantee-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .guarantee-box h2 {
            font-family: 'Sora', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #0a0e27;
        }

        .guarantee-text {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        /* CTA Final */
        .final-cta {
            padding: 80px 24px;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
            color: white;
            text-align: center;
        }

        .final-cta h2 {
            font-family: 'Sora', sans-serif;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .final-cta > p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }
