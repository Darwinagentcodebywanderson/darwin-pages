<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de CFTV - Aprenda uma Nova Profissão | Darwin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        #sp {
            background: linear-gradient(90deg, #ff6b35, #ff8c42);
        }
        
        nav#mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0);
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        nav#mainnav.scrolled {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }
        
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-cta {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .cta-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: #0f0f0f;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }
        
        .cta-btn:active {
            transform: translateY(0);
        }
        
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 40px 60px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }
        
        .hero-content {
            max-width: 700px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b35, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #b0b0b0;
        }
        
        .hero .cta-btn {
            font-size: 16px;
            padding: 16px 48px;
            margin: 0 auto;
            display: inline-block;
        }
        
        .proof {
            margin-top: 50px;
            font-size: 14px;
            color: #888;
        }
        
        .proof strong {
            color: #ff6b35;
        }
        
        .section {
            padding: 100px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 60px;
            text-align: center;
            background: linear-gradient(135deg, #ff6b35, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .pain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        
        .pain-card {
            background: rgba(255, 107, 53, 0.05);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 53, 0.1);
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .pain-card.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .pain-card:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: rgba(255, 107, 53, 0.2);
            transform: translateY(-5px);
        }
        
        .pain-icon {
            font-size: 36px;
            margin-bottom: 15px;
        }
        
        .pain-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff6b35;
        }
        
        .pain-card p {
            font-size: 14px;
            line-height: 1.6;
            color: #a0a0a0;
        }
        
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .benefit-item {
            background: rgba(255, 107, 53, 0.08);
            padding: 30px;
            border-radius: 10px;
            border-left: 4px solid #ff6b35;
            opacity: 0;
        }
        
        .benefit-item.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        .benefit-item h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ff8c42;
        }
        
        .benefit-item p {
            font-size: 14px;
            line-height: 1.5;
            color: #a0a0a0;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        
        .metric-card {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 140, 66, 0.05));
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 53, 0.15);
            opacity: 0;
        }
        
        .metric-card.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        .metric-number {
            font-family: 'Syne', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #ff6b35;
            margin-bottom: 10px;
        }
        
        .metric-label {
            font-size: 14px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .testimonials {
            margin-bottom: 80px;
        }
        
        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        
        .testimonial {
            background: rgba(255, 107, 53, 0.06);
            padding: 35px;
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 53, 0.12);
            opacity: 0;
        }
        
        .testimonial.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        .stars {
            color: #ff6b35;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .testimonial p {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
            color: #b0b0b0;
            font-style: italic;
        }
        
        .testimonial-author {
            border-top: 1px solid rgba(255, 107, 53, 0.15);
            padding-top: 15px;
        }
        
        .author-name {
            font-weight: 700;
            color: #ff8c42;
            font-size: 14px;
        }
        
        .author-role {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }
        
        .guarantee {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 140, 66, 0.05));
            border: 2px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            padding: 50px 40px;
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
        }
        
        .guarantee.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        .guarantee-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .guarantee h3 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: #ff6b35;
            margin-bottom: 15px;
        }
        
        .guarantee p {
            font-size: 16px;
            color: #b0b0b0;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .cta-section {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border-top: 2px solid rgba(255, 107, 53, 0.3);
            border-bottom: 2px solid rgba(255, 107, 53, 0.3);
            padding: 80px 40px;
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
        }
        
        .cta-section.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        .cta-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ff6b35, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .checklist {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }
        
        .checklist-item {
            font-size: 15px;
            color: #b0b0b0;
            padding-left: 30px;
            position: relative;
        }
        
        .checklist-item::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #ff6b35;
            font-weight: 700;
            font-size: 18px;
        }
        
        .cta-section .cta-btn {
            font-size: 18px;
            padding: 18px 50px;
        }
        
        .faq-section {
            margin-bottom: 80px;
        }
        
        .faq-list {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .fi {
            margin-bottom: 15px;
            border: 1px solid rgba(255, 107, 53, 0.15);
            border-radius: 10px;
            overflow: hidden;
            opacity: 0;
        }
        
        .fi.rv.in {
            animation: slideUp 0.6s ease forwards;
        }
        
        .fi-btn {
            width: 100%;
            background: rgba(255, 107, 53, 0.08);
            border: none;
            padding: 20px;
            text-align: left;
            font-size: 15px;
            font-weight: 600
