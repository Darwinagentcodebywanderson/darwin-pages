<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Perguntas e Respostas Sobre Dinheiro e Investimentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #ffffff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* BARRA DE PROGRESSO */
        #sp {
            background: linear-gradient(90deg, #2d7a4a 0%, #4a9f68 100%);
        }
        
        /* NAVEGAÇÃO */
        #mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 0;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        
        #mainnav.scrolled {
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid #e0e0e0;
            padding: 8px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #2d7a4a;
            letter-spacing: -0.5px;
        }
        
        .nav-cta {
            display: none;
        }
        
        @media (min-width: 768px) {
            .nav-cta {
                display: block;
            }
            
            .cta-btn {
                background: #2d7a4a;
                color: white;
                padding: 10px 28px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 600;
                font-size: 14px;
                border: none;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            .cta-btn:hover {
                background: #1f5530;
                transform: translateY(-2px);
                box-shadow: 0 8px 16px rgba(45, 122, 74, 0.2);
            }
        }
        
        /* HERO */
        .hero {
            padding: 140px 0 80px;
            background: linear-gradient(135deg, #f8faf7 0%, #eef5f0 100%);
            margin-top: 60px;
        }
        
        .hero-content {
            max-width: 700px;
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        
        .hero-subtitle {
            font-size: 20px;
            color: #444;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .hero-cta-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .cta-btn-hero {
            background: #2d7a4a;
            color: white;
            padding: 16px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
        }
        
        .cta-btn-hero:hover {
            background: #1f5530;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(45, 122, 74, 0.25);
        }
        
        .social-proof {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }
        
        .proof-item {
            display: flex;
            flex-direction: column;
        }
        
        .proof-number {
            font-weight: 800;
            font-size: 24px;
            color: #2d7a4a;
        }
        
        .proof-text {
            color: #666;
            margin-top: 4px;
        }
        
        @media (max-width: 768px) {
            .hero {
                padding: 100px 0 60px;
            }
            
            .hero h1 {
                font-size: 36px;
            }
            
            .hero-subtitle {
                font-size: 16px;
            }
            
            .social-proof {
                gap: 20px;
            }
        }
        
        /* SEÇÃO DE DORES */
        .pains {
            padding: 100px 0;
            background: #ffffff;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 60px;
            text-align: center;
            color: #1a1a1a;
        }
        
        .pains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }
        
        .pain-card {
            padding: 40px;
            background: #f8faf7;
            border-radius: 12px;
            border-left: 5px solid #e74c3c;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        .pain-card.in {
            opacity: 1;
        }
        
        .pain-card:hover {
            transform: translateY(-5px);
        }
        
        .pain-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        
        .pain-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        
        .pain-card p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }
        
        /* SEÇÃO DE TRANSFORMAÇÃO */
        .transformation {
            padding: 100px 0;
            background: linear-gradient(135deg, #2d7a4a 0%, #1f5530 100%);
            color: white;
        }
        
        .transformation .section-title {
            color: white;
            margin-bottom: 70px;
        }
        
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
        }
        
        .benefit-item {
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
            backdrop-filter: blur(10px);
        }
        
        .benefit-item.in {
            opacity: 1;
        }
        
        .benefit-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }
        
        .benefit-number {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .benefit-item h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .benefit-item p {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.95;
        }
        
        /* SEÇÃO DE NÚMEROS */
        .stats {
            padding: 80px 0;
            background: #f8faf7;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 50px;
            text-align: center;
        }
        
        .stat-card {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .stat-card.in {
            opacity: 1;
        }
        
        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 800;
            color: #2d7a4a;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 15px;
            color: #666;
            font-weight: 500;
        }
        
        /* DEPOIMENTOS */
        .testimonials {
            padding: 100px 0;
            background: white;
        }
        
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }
        
        .testimonial-card {
            padding: 40px;
            background: #f8faf7;
            border-radius: 12px;
            border-top: 4px solid #2d7a4a;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        .testimonial-card.in {
            opacity: 1;
        }
        
        .testimonial-card:hover {
            transform: translateY(-5px);
        }
        
        .testimonial-stars {
            color: #ffc107;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .testimonial-text {
            color: #333;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .author-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2d7a4a, #4a9f68);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }
        
        .author-info h4 {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .author-info p {
            font-size: 13px;
            color: #666;
        }
        
        /* GARANTIA */
        .guarantee {
            padding: 60px 0;
            background: linear-gradient(135deg, #f8faf7 0%, #eef5f0 100%);
        }
        
        .guarantee-content {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        
        .guarantee-icon {
            font-size: 80px;
            flex-shrink: 0;
        }
        
        .guarantee-text h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        
        .guarantee-text p {
            color: #666;
            font-size: 15px;
            line-height: 1.7;
        }
        
        @media (max-width: 768px) {
            .guarantee-content {
                flex-direction: column;
                text-align: center;
            }
            
            .guarantee-icon {
                font-size: 60px;
            }
        }
        
        /* SEÇÃO CTA FINAL */
        .final-cta {
            padding: 100px 0;
            background: linear-gradient(135deg, #1f5530 0%, #2d7a4a 100%);
            color: white;
            text-align: center;
        }
        
        .final-cta h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
        }
        
        .final-cta p {
            font-size: 18px;
            margin-bottom: 50px;
            opacity: 0.95;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .cta-btn-final {
            background: white;
            color: #2d7a4a;
            padding: 18px 50px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            margin-bottom: 40px;
        }
        
        .cta-btn-final:hover {
            background: #f0f0f0;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        
        .checklist {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
        }
        
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
        }
        
        .checklist-check
