<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula Negócio Online - Transforme Seu Marketing em Vendas Reais</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            background: #ffffff;
            overflow-x: hidden;
        }

        #sp {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            z-index: 999;
            width: 0%;
            transition: width .1s;
        }

        nav#mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        }

        nav#mainnav.scrolled {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 0 40px;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            color: #ff6b35;
            letter-spacing: -1px;
        }

        .nav-cta {
            font-size: 14px;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .hero {
            margin-top: 70px;
            padding: 80px 40px;
            background: linear-gradient(135deg, #ffffff 0%, #fff8f3 100%);
            text-align: center;
            min-height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: -200px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -200px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(247, 147, 30, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .hero h1 span {
            color: #ff6b35;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #555;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .hero-cta-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-bottom: 60px;
        }

        .cta-btn {
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
            min-width: 280px;
        }

        .cta-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
        }

        .cta-btn:active {
            transform: translateY(-1px);
        }

        .hero-social {
            font-size: 14px;
            color: #888;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #ddd;
        }

        .hero-social strong {
            color: #ff6b35;
            font-weight: 700;
        }

        .dores-section {
            padding: 80px 40px;
            background: #f9f9f9;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .section-subtitle {
            text-align: center;
            font-size: 16px;
            color: #777;
            margin-bottom: 60px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .dolor-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .dolor-card.in {
            opacity: 1;
        }

        .dolor-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .dolor-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(247, 147, 30, 0.2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .dolor-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .dolor-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.7;
        }

        .transformacao-section {

            border-radius: 14px;
            border: 1px solid #ffe5d4;
            opacity: 0;

        .benefit-card.in {
            opacity: 1;
        }

        .benefit-card:hover {

        }

        .benefit-number {

            color: #ff6b35;
            margin-bottom: 12px;
        }

        .benefit-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .benefit-card p {
            font-size: 14px;
            color: #777;
            line-height: 1.7;
        }

        .numeros-section {
            padding: 80px 40px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            text-align: center;
        }

        .numeros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
            margin-top: 60px;
        }

        .numero-item h4 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .numero-item p {
            font-size: 16px;
            opacity: 0.95;
        }

        .numeros-section .section-title {
            color: white;
        }

        .depoimentos-section {

            background: #f9f9f9;

        }

        .depoimento-card {

            opacity: 0;

            border-left: 4px solid #ff6b35;
        }

        .depoimento-card.in {
            opacity: 1;
        }

        .depoimento-stars {

        }

        .depoimento-text {

            color: #666;
            margin-bottom: 20px;
            font-style: italic;
            line-height: 1.8;
        }

        .depoimento-autor {

            font-size: 15px;
        }

        .depoimento-cargo {
            font-size: 13px;
            color: #ff6b35;
            margin-top: 4px;
        }

        .depoimento-resultado {
            background: #fff8f3;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 600;
            color: #ff6b35;
        }

        .garantia-section {
            padding: 80px 40px;
            background: white;
        }

        .garantia-card {
            max-width: 700px;
            margin: 0 auto;
            background: linear-gradient(135deg, #fff8f3, #ffffff);

            padding: 50px;
            text-align: center;
        }

        .garantia-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .garantia-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .garantia-card p {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
        }

        .cta-section {
            padding: 80px 40px;
            background: linear-gradient(135deg, #ffffff 0%, #fff8f3 100%);
            text-align: center;
        }

        .cta-final-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .cta-final-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .cta-final-content p {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .checklist {
            text-align: left;
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin: 40px 0;
            display: inline-block;
            width: 100%;
            max-width: 500px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 15px;
            color: #333;
        }

        .checklist-item:last-child {
            margin-bottom: 0;
        }
