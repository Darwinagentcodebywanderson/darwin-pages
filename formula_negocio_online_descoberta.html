<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula Negócio Online | Descubra o Método Que Está Mudando Vidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            background: #fafafa;
            line-height: 1.6;
        }

        header {
            background: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #efefef;
            transition: all 0.3s ease;
        }

        header.scrolled {
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Epilogue', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #ff6b35;
            letter-spacing: -1px;
        }

        .nav-cta {
            background: #ff6b35;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: #e55a28;
            transform: translateY(-2px);
        }

        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Epilogue', sans-serif;
            font-size: 56px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .hero p {
            font-size: 20px;
            color: #4a4a4a;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 16px 40px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .cta-btn.primary {
            background: linear-gradient(135deg, #ff6b35 0%, #f23b3b 100%);
            color: white;
        }

        .cta-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .cta-btn.secondary {
            background: white;
            color: #ff6b35;
            border: 2px solid #ff6b35;
        }

        .cta-btn.secondary:hover {
            background: #fff5f0;
        }

        .social-proof {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding-top: 40px;
            border-top: 1px solid #efefef;
            max-width: 700px;
            margin: 0 auto;
        }

        .proof-item {
            text-align: center;
        }

        .proof-number {
            font-family: 'Epilogue', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: #ff6b35;
        }

        .proof-label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Epilogue', sans-serif;
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            color: #1a1a1a;
        }

        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .dor-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .dor-card.in {
            opacity: 1;
        }

        .dor-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.08);
        }

        .dor-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .dor-card h3 {
            font-family: 'Epilogue', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .dor-card p {
            color: #666;
            font-size: 15px;
        }

        .beneficios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .beneficio-item {
            background: white;
            padding: 32px;
            border-radius: 12px;
            opacity: 0;
            transition: all 0.5s ease;
            border: 1px solid #efefef;
        }

        .beneficio-item.in {
            opacity: 1;
        }

        .beneficio-item:hover {
            border-color: #ff6b35;
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.12);
        }

        .beneficio-check {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ff6b35 0%, #f23b3b 100%);
            color: white;
            border-radius: 50%;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .beneficio-item h3 {
            font-family: 'Epilogue', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .beneficio-item p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .stats-section {
            background: linear-gradient(135deg, #ff6b35 0%, #f23b3b 100%);
            color: white;
            padding: 60px 20px;
            border-radius: 16px;
            margin: 40px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .stat-item h4 {
            font-family: 'Epilogue', sans-serif;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-item p {
            font-size: 14px;
            opacity: 0.9;
        }

        .testimonials-section {
            background: white;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .testimonial-card {
            background: #f8f8f8;
            padding: 32px;
            border-radius: 12px;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .testimonial-card.in {
            opacity: 1;
        }

        .testimonial-stars {
            color: #ff6b35;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .testimonial-text {
            font-size: 15px;
            color: #444;
            margin-bottom: 20px;
            line-height: 1.6;
            font-style: italic;
        }

        .testimonial-author {
            font-family: 'Epilogue', sans-serif;
            font-weight: 700;
            color: #1a1a1a;
            font-size: 15px;
        }

        .testimonial-role {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .guarantee-section {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.05) 0%, rgba(242, 59, 59, 0.05) 100%);
            border: 2px solid #ff6b35;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 60px 0;
        }

        .guarantee-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .guarantee-section h3 {
            font-family: 'Epilogue', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .guarantee-section p {
            color: #666;
            max-width: 500px;
            margin: 0 auto;
        }

        .cta-final-section {
            background: linear-gradient(135deg, #ff6b35 0%, #f23b3b 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 16px;
            margin: 40px 0;
        }

        .cta-final-section h2 {
            font-family: 'Epilogue', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .cta-benefits-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .benefit-check {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
        }

        .benefit-check::before {
            content: "✓";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            flex-shrink: 0;
            font-weight: 700;
        }

        .cta-btn.large {
            padding: 18px 48px;
            font-size: 18px;
            background: white;
            color: #ff6b35;
            font-weight: 700;
            margin: 20px 0;
        }

        .cta-btn.large:hover {
            background: #fff5f0;
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }

        .faq-section {
            background: white;
        }

        .faq-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .fi {
            border-bottom: 1px solid #efefef;
            overflow: hidden;
        }

        .fi:last-child {
            border-bottom: none;
        }

        .fi-button {
            width: 100%;
            padding: 24px;
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            transition: all 0.3s ease;
        }

        .fi-button:hover {
            color: #ff6b35;
        }

        .fi-arrow {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-right: 2px solid #ff6b35;
            border-bottom: 2px solid #ff6b35;
            transform: rotate(-45deg);
            transition: transform 0.3s ease;
        }

        .fi.open .fi-arrow {
            transform: rotate(135deg);
        }

        .fi-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 24px;
        }

        .fi.open .fi-content {
            max-height: 400px;
            padding: 0 24px 24px;
        }

        .fi-content p {
            color: #666;
            line-height: 1.6;
        }

        footer {
            background: #1a1a1a;
            color: white;
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
        }

        footer p {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size
