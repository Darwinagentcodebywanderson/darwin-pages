<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de CFTV - Aprenda uma Nova Profissão Agora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            background: #ffffff;
            line-height: 1.6;
        }

        /* BARRA DE PROGRESSO */
        #sp {
            background: linear-gradient(90deg, #ff6b35 0%, #ff8c42 100%);
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        /* NAVEGAÇÃO */
        #mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }

        #mainnav.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            padding: 12px 32px;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: #ff6b35;
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-cta {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        /* STICKY CTA MOBILE */
        #stickycta {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
        }

        #stickycta .cta-btn {
            width: 100%;
            padding: 14px 16px;
            background: white;
            color: #ff6b35;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #stickycta .cta-btn:active {
            transform: scale(0.98);
        }

        /* HERO */
        .hero {
            margin-top: 70px;
            padding: 60px 32px;
            background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%);
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero .subheadline {
            font-size: 18px;
            color: #555;
            margin-bottom: 32px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-cta {
            padding: 18px 48px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
            display: inline-block;
            text-decoration: none;
        }

        .hero-cta:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(255, 107, 53, 0.4);
        }

        .hero-cta:active {
            transform: translateY(-1px);
        }

        .prova-social {
            display: inline-block;
            font-size: 14px;
            color: #666;
            padding: 12px 20px;
            background: rgba(255, 107, 53, 0.08);
            border-radius: 6px;
            margin-top: 20px;
        }

        .prova-social strong {
            color: #ff6b35;
            font-weight: 700;
        }

        /* SEÇÃO DE DORES */
        .dores {
            padding: 80px 32px;
            background: white;
        }

        .section-title {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            color: #1a1a1a;
        }

        .dores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dor-card {
            padding: 40px;
            background: #f9f9f9;
            border-radius: 12px;
            border-left: 5px solid #ff6b35;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .dor-card.in {
            opacity: 1;
        }

        .dor-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        .dor-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 12px;
        }

        .dor-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* SEÇÃO DE BENEFÍCIOS */
        .beneficios {
            padding: 80px 32px;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
        }

        .beneficios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .benefit-card {
            padding: 35px;
            background: white;
            border-radius: 10px;
            text-align: center;
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .benefit-card.in {
            opacity: 1;
        }

        .benefit-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.15);
            border-color: #ff6b35;
        }

        .benefit-icon {
            font-size: 40px;
            margin-bottom: 16px;
            display: block;
        }

        .benefit-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .benefit-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        /* SEÇÃO DE NÚMEROS */
        .numeros {
            padding: 80px 32px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
        }

        .numeros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 50px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        .numero-item h2 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 8px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .numero-item.in h2 {
            opacity: 1;
        }

        .numero-item p {
            font-size: 16px;
            font-weight: 500;
            opacity: 0.95;
        }

        /* SEÇÃO DE DEPOIMENTOS */
        .depoimentos {
            padding: 80px 32px;
            background: white;
        }

        .depoimentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 35px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .depoimento-card {
            padding: 35px;
            background: #f9f9f9;
            border-radius: 10px;
            border: 1px solid #e8e8e8;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .depoimento-card.in {
            opacity: 1;
        }

        .depoimento-card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-color: #ff6b35;
        }

        .stars {
            color: #ff6b35;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .depoimento-texto {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
            font-style: italic;
            line-height: 1.7;
        }

        .depoimento-autor {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 15px;
        }

        .depoimento-cargo {
            font-size: 13px;
            color: #ff6b35;
            font-weight: 600;
        }

        .depoimento-estado {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* SEÇÃO DE GARANTIA */
        .garantia {
            padding: 80px 32px;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
        }

        .garantia-card {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 40px;
            background: white;
            border-radius: 12px;
            border: 2px solid #ff6b35;
            text-align: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .garantia-card.in {
            opacity: 1;
        }

        .garantia-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .garantia-card h2 {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .garantia-card p {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .garantia-detalhe {
            font-size: 14px;
            color: #ff6b35;
            font-weight: 600;
            margin-top: 20px;
        }

        /* SEÇÃO CTA FINAL */
        .cta-final {
            padding: 80px 32px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            text-align: center;
        }

        .cta-final h2 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .cta-final p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.95;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-checklist {
            display: inline-block;
            text-align: left;
            margin-bottom: 40px;
            max-width: 500px;
        }

        .checklist-item {
            padding: 12px 0;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .checklist-item:before {
            content: '✓';
            display: inline-block;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            margin-right: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .cta-final-btn {
            padding: 20px 60px;
            background: white;
            color: #ff6b35;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
        }

        .cta-final-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        /* SEÇÃO FAQ */
        .faq {
            padding: 80px 32px;
            background: white;
        }

        .faq-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .fi {
            margin-bottom: 20px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
        }

        .fi.open .faq-title {
