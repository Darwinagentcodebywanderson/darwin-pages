<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprenda CFTV e Mude sua Carreira | Darwin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      line-height: 1.6;
      background: #fafafa;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    /* Progress bar */
    #sp {
      background: linear-gradient(90deg, #00d4ff, #0099ff);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    /* Navigation */
    nav#mainnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    nav#mainnav.scrolled {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .nav-cta {
      class: cta-btn;
      padding: 10px 20px;
      background: #0099ff;
      color: white;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .nav-cta:hover {
      background: #0077cc;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 153, 255, 0.3);
    }

    /* Hero Section */
    .hero {
      padding-top: 140px;
      padding-bottom: 80px;
      background: linear-gradient(135deg, #f5f7ff 0%, #e8f0ff 50%, #f0e8ff 100%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      color: #0a0a0a;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 20px;
      color: #555;
      margin-bottom: 32px;
      max-width: 700px;
    }

    .hero-cta-group {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
      align-items: center;
      flex-wrap: wrap;
    }

    .cta-btn {
      padding: 14px 32px;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      color: white;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 153, 255, 0.4);
    }

    .trust-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #666;
    }

    .trust-badge strong {
      color: #0099ff;
      font-weight: 700;
    }

    /* Reveal Animation */
    .rv {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .rv.in {
      opacity: 1;
      transform: translateY(0);
    }

    /* Problems Section */
    .problems {
      padding: 80px 24px;
      background: white;
    }

    .section-header {
      max-width: 800px;
      margin: 0 auto 60px;
      text-align: center;
    }

    .section-header h2 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #0a0a0a;
    }

    .section-header p {
      font-size: 18px;
      color: #666;
    }

    .problems-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
    }

    .problem-card {
      padding: 40px;
      background: #f5f7ff;
      border-radius: 12px;
      border-left: 4px solid #ff6b6b;
      transition: all 0.3s ease;
    }

    .problem-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    .problem-card h3 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #0a0a0a;
    }

    .problem-card p {
      font-size: 16px;
      color: #555;
      line-height: 1.7;
    }

    /* Benefits Section */
    .benefits {
      padding: 80px 24px;
      background: linear-gradient(135deg, #f5f7ff 0%, #f0e8ff 100%);
    }

    .benefits-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-item {
      padding: 32px;
      background: white;
      border-radius: 12px;
      border-top: 4px solid #00d4ff;
      text-align: center;
      transition: all 0.3s ease;
    }

    .benefit-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0, 153, 255, 0.15);
    }

    .benefit-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .benefit-item h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #0a0a0a;
    }

    .benefit-item p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }

    /* Stats Section */
    .stats {
      padding: 80px 24px;
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      color: white;
    }

    .stats-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
      text-align: center;
    }

    .stat {
      padding: 32px;
    }

    .stat-number {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .stat-label {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }

    /* Testimonials */
    .testimonials {
      padding: 80px 24px;
      background: white;
    }

    .testimonials-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
    }

    .testimonial {
      padding: 32px;
      background: #f5f7ff;
      border-radius: 12px;
      border-left: 4px solid #00d4ff;
      position: relative;
    }

    .testimonial::before {
      content: '"';
      font-size: 80px;
      color: #0099ff;
      opacity: 0.3;
      position: absolute;
      top: -10px;
      left: 16px;
    }

    .testimonial-text {
      font-size: 16px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    .testimonial-author {
      font-weight: 700;
      color: #0a0a0a;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .testimonial-role {
      font-size: 14px;
      color: #0099ff;
      font-weight: 600;
    }

    /* Guarantee */
    .guarantee {
      padding: 80px 24px;
      background: linear-gradient(135deg, #f0e8ff 0%, #e8f0ff 100%);
    }

    .guarantee-container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      padding: 48px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      border: 2px solid #00d4ff;
    }

    .guarantee-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    .guarantee-container h2 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #0a0a0a;
    }

    .guarantee-container p {
      font-size: 18px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.7;
    }

    /* CTA Final */
    .cta-final {
      padding: 80px 24px;
      background: #0a0a0a;
      color: white;
    }

    .cta-final-container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    .cta-final h2 {
      font-size: 44px;
      font-weight: 800;
      margin-bottom: 32px;
    }

    .cta-checklist {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
      text-align: left;
    }

    .checklist-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 8px;
      border-left: 3px solid #00d4ff;
    }

    .checklist-item::before {
      content: '✓';
      color: #00d4ff;
      font-weight: 700;
      font-size: 20px;
      flex-shrink: 0;
    }

    .checklist-item span {
      font-size: 15px;
      line-height: 1.5;
    }

    .cta-final .cta-btn {
      padding: 16px 48px;
      font-size: 18px;
      margin-top: 20px;
    }

    /* FAQ */
    .faq {
      padding: 80px 24px;
      background: white;
    }

    .faq-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .faq-item {
      margin-bottom: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      background: #f9f9f9;
      transition: all 0.3s ease;
    }

    .faq-item.open {
      background: white;
      border-color: #0099ff;
      box-shadow: 0 4px 16px rgba(0, 153, 255, 0.15);
    }

    .faq-question {
      padding: 20px 24px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      color: #0a0a0a;
      user-select: none;
      transition: all 0.3s ease;
    }
