<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula Negócio Online | Descubra o Sistema que Está Transformando Empreendedores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            background: #ffffff;
            line-height: 1.6;
        }

        /* Barra de progresso */
        #sp {
            background: linear-gradient(90deg, #ff6b35, #f7b801);
        }

        /* Navegação */
        #mainnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        #mainnav.scrolled {
            border-bottom: 1px solid #f0f0f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .nav-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b35, #f7b801);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-cta {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        /* Hero Section */
        .hero {
            padding-top: 140px;
            padding-bottom: 60px;
            background: linear-gradient(135deg, #f9f7f4 0%, #fef5e8 100%);
            text-align: center;
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .hero-eyebrow {
            display: inline-block;
            padding: 8px 16px;
            background: #ffe4cc;
            border-radius: 20px;
            color: #d94a1a;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 56px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .hero-subheading {
            font-size: 20px;
            color: #555;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .hero-highlight {
            color: #ff6b35;
            font-weight: 700;
        }

        .cta-btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #ff6b35, #f7b801);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(255, 107, 53, 0.4);
        }

        .cta-btn:active {
            transform: translateY(-2px);
        }

        .hero-social {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .social-number {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #ff6b35;
            margin-bottom: 4px;
        }

        .social-label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Dores Section */
        .pains {
            padding: 80px 24px;
            background: #fff;
        }

        .pains-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 16px;
            color: #1a1a1a;
            text-align: center;
        }

        .section-subtitle {
            font-size: 18px;
            color: #666;
            text-align: center;
            margin-bottom: 60px;
            font-weight: 400;
        }

        .pains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .pain-card {
            background: #f9f7f4;
            padding: 40px;
            border-radius: 16px;
            border-left: 4px solid #ff6b35;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .pain-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .pain-card.rv {
            transform: translateY(20px);
        }

        .pain-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .pain-title {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .pain-description {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
        }

        /* Benefits Section */
        .benefits {
            padding: 80px 24px;
            background: linear-gradient(135deg, #fef5e8 0%, #fff5f0 100%);
        }

        .benefits-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
            margin-top: 60px;
        }

        .benefit-item {
            background: white;
            padding: 32px;
            border-radius: 12px;
            display: flex;
            gap: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .benefit-item.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .benefit-item.rv {
            transform: translateY(20px);
        }

        .benefit-number {
            flex-shrink: 0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b35, #f7b801);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 24px;
        }

        .benefit-content h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .benefit-content p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* Stats Section */
        .stats {
            padding: 80px 24px;
            background: #1a1a1a;
            color: white;
        }

        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-title {
            font-family: 'Poppins', sans-serif;
            font-size: 42px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 60px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 40px;
        }

        .stat-box {
            text-align: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .stat-box.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .stat-box.rv {
            transform: translateY(20px);
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b35, #f7b801);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 16px;
            color: #ccc;
            font-weight: 500;
        }

        /* Testimonials Section */
        .testimonials {
            padding: 80px 24px;
            background: white;
        }

        .testimonials-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-top: 60px;
        }

        .testimonial-card {
            background: linear-gradient(135deg, #f9f7f4 0%, #fef5e8 100%);
            padding: 36px;
            border-radius: 12px;
            border: 1px solid #ffe4cc;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .testimonial-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial-card.rv {
            transform: translateY(20px);
        }

        .testimonial-stars {
            color: #f7b801;
            font-size: 16px;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .testimonial-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 24px;
            line-height: 1.8;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            flex-direction: column;
            padding-top: 16px;
            border-top: 1px solid #ffe4cc;
        }

        .author-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .author-info {
            font-size: 13px;
            color: #999;
        }

        .author-result {
            font-weight: 600;
            color: #ff6b35;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Guarantee Section */
        .guarantee {
            padding: 80px 24px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }

        .guarantee-container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .guarantee-badge {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255, 107, 53, 0.2);
            border: 2px solid #ff6b35;
            border-radius: 20px;
            color: #ff6b35;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .guarantee-title {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
        }

        .guarantee-text {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .guarantee-icon {
            font-size: 60px;
            margin-bottom: 24px;
        }

        /* CTA Final Section */
        .cta-final {
            padding: 80px 24px;
            background: white;
        }

        .cta-final-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .cta-final-title {
            font-family: 'Poppins', sans-serif;
            font-size: 42px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .cta-final-subtitle
