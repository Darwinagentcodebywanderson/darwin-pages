<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>50 Perguntas e Respostas Sobre Dinheiro e Investimentos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      line-height: 1.6;
    }

    #sp {
      background: linear-gradient(90deg, #2ecc71, #27ae60);
      box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
    }

    /* NAVEGAÇÃO */
    #mainnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }

    #mainnav.scrolled {
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 0.8rem 2rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #2ecc71;
      text-decoration: none;
    }

    .nav-cta {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .nav-cta .cta-btn {
      padding: 0.7rem 1.5rem;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      text-decoration: none;
      display: inline-block;
    }

    .nav-cta .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
    }

    /* HERO */
    .hero {
      margin-top: 70px;
      padding: 4rem 2rem;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(46, 204, 113, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      line-height: 1.15;
      color: #1a1a1a;
      margin-bottom: 1rem;
      font-weight: 800;
      opacity: 0;
      animation: slideInDown 0.8s ease forwards;
    }

    .hero-badge {
      display: inline-block;
      background: #fff3e0;
      color: #e65100;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: slideInUp 0.8s ease 0.2s forwards;
    }

    .hero p {
      font-size: 1.25rem;
      color: #555;
      margin-bottom: 2rem;
      line-height: 1.6;
      opacity: 0;
      animation: slideInUp 0.8s ease 0.4s forwards;
    }

    .hero-cta {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: slideInUp 0.8s ease 0.6s forwards;
    }

    .hero .cta-btn {
      padding: 1.2rem 2.5rem;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
    }

    .hero .cta-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transition: left 0.4s ease;
    }

    .hero .cta-btn:hover::before {
      left: 100%;
    }

    .hero .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
    }

    .proof-social {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 3rem;
      opacity: 0;
      animation: slideInUp 0.8s ease 0.8s forwards;
    }

    .proof-item {
      text-align: center;
    }

    .proof-item strong {
      display: block;
      font-size: 2rem;
      color: #2ecc71;
      font-weight: 800;
      margin-bottom: 0.3rem;
    }

    .proof-item span {
      color: #777;
      font-size: 0.95rem;
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* DORES */
    .pains {
      padding: 4rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
    }

    .section-title h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #1a1a1a;
      margin-bottom: 0.8rem;
      font-weight: 800;
    }

    .section-title p {
      color: #777;
      font-size: 1.1rem;
    }

    .pains-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    .pain-card {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      border-left: 4px solid #e74c3c;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
    }

    .pain-card.in {
      opacity: 1;
      transform: translateY(0);
    }

    .pain-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .pain-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .pain-card h3 {
      font-size: 1.3rem;
      margin-bottom: 0.8rem;
      color: #1a1a1a;
    }

    .pain-card p {
      color: #666;
      line-height: 1.6;
    }

    /* BENEFÍCIOS */
    .benefits {
      padding: 4rem 2rem;
      background: white;
      max-width: 1200px;
      margin: 0 auto;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .benefit-card {
      padding: 2rem;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border-radius: 12px;
      border: 1px solid #bbf7d0;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
    }

    .benefit-card.in {
      opacity: 1;
      transform: translateY(0);
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.15);
    }

    .benefit-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      background: #2ecc71;
      color: white;
      border-radius: 50%;
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .benefit-card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.8rem;
      color: #1a1a1a;
    }

    .benefit-card p {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* NÚMEROS */
    .numbers {
      padding: 4rem 2rem;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: white;
    }

    .numbers-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .number-item {
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.3s ease;
    }

    .number-item.in {
      opacity: 1;
      transform: scale(1);
    }

    .number-value {
      font-size: 3rem;
      font-weight: 800;
      color: #2ecc71;
      margin-bottom: 0.5rem;
      font-family: 'Playfair Display', serif;
    }

    .number-label {
      color: #ccc;
      font-size: 1rem;
    }

    /* DEPOIMENTOS */
    .testimonials {
      padding: 4rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .testimonial {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      border-top: 4px solid #2ecc71;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
    }

    .testimonial.in {
      opacity: 1;
      transform: translateY(0);
    }

    .testimonial:hover {
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      transform: translateY(-5px);
    }

    .testimonial-stars {
      color: #ffc107;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .testimonial p {
      color: #555;
      margin-bottom: 1.5rem;
      font-style: italic;
      line-height: 1.7;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .author-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .author-info strong {
      display: block;
      color: #1a1a1a;
      font-weight: 600;
    }

    .author-info span {
      color: #999;
      font-size: 0.85rem;
    }

    /* GARANTIA */
    .guarantee {
      padding: 4rem 2rem;
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    }

    .guarantee-content {
      max-width: 800px;
      margin: 0 auto;
      text-
