<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprenda CFTV e Transforme sua Carreira | Curso Prático</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            background: #fafaf9;
            line-height: 1.6;
        }

        #sp {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #ff6b35, #f7931e, #ff6b35);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }

        nav#mainnav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: white;
            position: sticky;
            top: 4px;
            z-index: 1000;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        nav#mainnav.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            border-bottom: 1px solid #f0f0f0;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .cta-btn {
            padding: 0.75rem 1.8rem;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        .hero {
            padding: 6rem 2rem;
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f0 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -150px;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(247, 147, 30, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero .subheadline {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: #666;
            margin-bottom: 2.5rem;
            font-weight: 400;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .cta-primary {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
        }

        .social-proof {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }

        .proof-item {
            text-align: center;
        }

        .proof-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .proof-label {
            font-size: 0.9rem;
            color: #999;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            .hero-buttons {
                flex-direction: column;
            }
            .social-proof {
                gap: 1.5rem;
            }
        }

        .section {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.8rem;
            color: #1a1a1a;
        }

        .section-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 3rem;
            font-size: 1.05rem;
        }

        .pains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .pain-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .pain-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .pain-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(-5px);
        }

        .pain-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .pain-card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        .pain-card p {
            color: #666;
            line-height: 1.7;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .benefit-item {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.05), rgba(247, 147, 30, 0.05));
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 53, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .benefit-item.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .benefit-item:hover {
            border-color: rgba(255, 107, 53, 0.3);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.1);
        }

        .benefit-check {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            border-radius: 50%;
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .benefit-item h3 {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            color: #1a1a1a;
        }

        .benefit-item p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .stats-section {
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            color: white;
            padding: 4rem 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-box {
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
        }

        .stat-box.rv.in {
            opacity: 1;
            transform: scale(1);
        }

        .stat-number {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 1rem;
            color: #ccc;
            font-weight: 500;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .testimonial-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .testimonial-card.rv.in {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial-card:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
            border-color: #ff6b35;
        }

        .stars {
            color: #f7931e;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .testimonial-text {
            color: #333;
            margin-bottom: 1.5rem;
            font-style: italic;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .testimonial-author {
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.3rem;
        }

        .testimonial-role {
            font-size: 0.85rem;
            color: #999;
        }

        .result-highlight {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(247, 147, 30, 0.1));
            padding: 0.5rem 1rem;
            border-radius: 6px;
            color: #ff6b35;
            font-weight: 600;
            display: inline-block;
            margin-top: 1rem;
        }

        .guarantee-section {
            background: white;
            padding: 4rem 2rem;
            text-align: center;
        }

        .guarantee-box {
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid #ff6b35;
            border-radius: 12px;
            padding: 3rem;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.02), rgba(247, 147, 30, 0.02));
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s ease;
        }

        .guarantee-box.rv.in {
            opacity: 1;
            transform: scale(1);
        }

        .guarantee-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .guarantee-box h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        .guarantee-box p {
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .cta-section {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
